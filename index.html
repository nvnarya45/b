<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BISLEA PRO</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>

<body>

<nav>
  <h2>BISLEA PRO PANEL</h2>
  <button onclick="logout()">Logout</button>
</nav>

<section>
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</section>

<hr>

<section>
<h3>Add Document</h3>
<input id="dtitle" placeholder="Title"><br><br>
<input id="durl" placeholder="PDF Link"><br><br>
<button onclick="addDoc()">Upload</button>
</section>

<section>
<h3>All Documents</h3>
<div id="docs"></div>
</section>

<hr>

<section>
<h3>Add Post</h3>
<input id="ptitle" placeholder="Title"><br><br>
<textarea id="pcontent"></textarea><br><br>
<button onclick="addPost()">Publish</button>
</section>

<section>
<h3>All Posts</h3>
<div id="posts"></div>
</section>

<script src="script.js"></script>
</body>
</html>
